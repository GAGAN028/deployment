apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7777
  type: LoadBalancer ## If your using the Nginx controller we can use the ClusterIP and Nginx controller support the multiple Endpoint. Using your ingress.yaml file

